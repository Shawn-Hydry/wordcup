<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>世界杯预测</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#0A0E1A;color:#F0F0F5;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:14px;line-height:1.5;max-width:430px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}

/* ====== 日期选择器 ====== */
.date-bar{display:flex;align-items:center;justify-content:center;padding:10px 12px 4px;gap:12px}
.date-arrow{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:rgba(18,24,42,.85);border:1px solid rgba(255,184,0,.1);cursor:pointer}
.date-arrow .arrow{font-size:20px;font-weight:700;color:#9A9AB0;line-height:1}
.date-center{display:flex;align-items:center;gap:8px;padding:6px 16px;border-radius:20px;background:rgba(18,24,42,.85);border:1px solid rgba(255,184,0,.1);cursor:pointer}
.date-weekday{font-size:12px;color:#5A5A72}
.date-main{font-size:15px;font-weight:700;color:#F0F0F5}
.date-tag{font-size:10px;font-weight:600;color:#0A0E1A;background:linear-gradient(135deg,#FFB800,#FF8C00);padding:1px 6px;border-radius:3px}
.date-picker{position:absolute;opacity:0;width:0;height:0;pointer-events:none}

/* ====== 比赛选择器 ====== */
.match-selector{padding:8px 0 4px;background:#0A0E1A;position:sticky;top:0;z-index:10}
.match-slider{display:flex;gap:10px;padding:0 12px;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.match-slider::-webkit-scrollbar{display:none}
.match-card{flex-shrink:0;scroll-snap-align:start;width:160px;background:rgba(18,24,42,.85);border:1px solid rgba(255,184,0,.1);border-radius:10px;padding:10px 12px;cursor:pointer;transition:all .25s}
.match-card.active{background:rgba(255,184,0,.08);border-color:rgba(255,184,0,.4);box-shadow:0 0 40rpx rgba(255,184,0,.15)}
.match-card.finished{opacity:.7;border-color:rgba(255,255,255,.06)}
.match-card.finished.active{opacity:1;border-color:rgba(255,184,0,.5)}
.card-teams{display:flex;align-items:center;justify-content:space-between;gap:4px}
.card-team{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;position:relative}
.card-flag{width:52px;height:52px;border-radius:50%;border:2px solid rgba(255,184,0,.2);background:rgba(255,255,255,.06);object-fit:cover}
.card-team-name{font-size:11px;font-weight:700;color:#F0F0F5;white-space:nowrap;overflow:visible}
.card-team-tag{font-size:8px;font-weight:600;color:#0A0E1A;background:linear-gradient(135deg,#FFB800,#FF8C00);padding:0 4px;border-radius:2px;margin-top:1px}
.card-center{flex-shrink:0;display:flex;align-items:center;justify-content:center;min-width:36px}
.card-score{font-size:15px;font-weight:900;color:#fff;letter-spacing:1px}
.card-vs{font-size:11px;font-weight:800;color:#5A5A72}
.card-time{display:block;text-align:center;font-size:10px;color:#5A5A72;margin-top:6px}

/* ====== 空状态 ====== */
.empty-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 0;gap:8px}
.empty-text{font-size:15px;font-weight:600;color:#9A9AB0}
.empty-hint{font-size:12px;color:#5A5A72}

/* ====== 比赛信息头 ====== */
.match-header{background:linear-gradient(135deg,#121A2E,#0D1225,#1A1230);border-radius:12px;margin:4px 12px 0;padding:14px 12px;text-align:center}
.stage-tag{display:inline-block;padding:2px 10px;border-radius:4px;font-size:11px;font-weight:600;background:rgba(255,184,0,.15);color:#FFB800;margin-bottom:8px}
.teams-row{display:flex;align-items:center;justify-content:center;gap:10px;margin:8px 0}
.team-info{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.team-flag{width:88px;height:88px;border-radius:50%;border:3px solid rgba(255,184,0,.25);background:rgba(255,255,255,.06);box-shadow:0 4px 16px rgba(0,0,0,.3);object-fit:cover}
.team-name{font-size:15px;font-weight:700}
.team-meta{font-size:11px;color:#5A5A72}
.team-formation{font-size:10px;color:#FFB800;background:rgba(255,184,0,.08);padding:1px 7px;border-radius:3px}
.vs-circle{width:36px;height:36px;border-radius:50%;background:rgba(255,184,0,.1);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:#FFB800;flex-shrink:0}
.score-circle{display:flex;align-items:center;justify-content:center;flex-shrink:0;gap:4px}
.score-num{font-size:28px;font-weight:900;color:#FFB800;min-width:24px;text-align:center;text-shadow:0 0 20rpx rgba(255,184,0,.3)}
.score-sep{font-size:22px;font-weight:700;color:#5A5A72;margin:0 2px}
.scorers-row{display:flex;justify-content:center;gap:20px;margin-top:4px}
.scorers-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.scorer-text{font-size:10px;color:#5A5A72}
.match-meta{display:flex;justify-content:center;gap:12px;margin-top:6px;font-size:12px;color:#5A5A72}

/* ====== Tab 栏 ====== */
.tab-bar{display:flex;background:rgba(18,24,42,.85);margin:10px 12px 0;border-radius:10px;padding:3px;gap:2px}
.tab-item{flex:1;text-align:center;padding:8px 0;border-radius:8px;font-size:12px;font-weight:600;color:#5A5A72;cursor:pointer;transition:.25s}
.tab-item.active{background:rgba(255,184,0,.25);color:#FFB800}
.tab-item .tab-icon{display:block;font-size:14px;margin-bottom:1px}

/* ====== Tab 内容区 ====== */
.tab-content{flex:1;overflow-y:auto;padding:10px 12px;min-height:0}
.tab-panel{display:none;animation:fadeIn .3s ease}
.tab-panel.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* ====== 通用卡片 ====== */
.card{background:rgba(18,24,42,.85);border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:0 2px 10px rgba(0,0,0,.2)}
.section-title{font-size:15px;font-weight:700;color:#FFB800;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.section-title::before{content:'';display:inline-block;width:3px;height:14px;background:linear-gradient(135deg,#FFB800,#FF8C00);border-radius:2px}
.divider{height:1px;background:linear-gradient(90deg,transparent,rgba(255,184,0,.1),transparent);margin:12px 0}
.sub-title{font-size:13px;font-weight:600;color:#9A9AB0;margin-bottom:8px;display:block}

/* ====== 概率条 ====== */
.prob-bar{display:flex;align-items:center;margin:6px 0;gap:8px}
.prob-label{width:38px;font-size:11px;color:#9A9AB0;text-align:right}
.prob-track{flex:1;height:10px;background:rgba(255,255,255,.06);border-radius:5px;overflow:hidden}
.prob-fill{height:100%;border-radius:5px;transition:width .8s ease}
.prob-home{background:linear-gradient(90deg,#00E5A0,#00B87D)}
.prob-draw{background:linear-gradient(90deg,#FFB800,#FF8C00)}
.prob-away{background:linear-gradient(90deg,#5B8DEF,#3D6FD9)}
.prob-value{width:44px;font-size:11px;font-weight:700;text-align:right}

/* ====== 爆冷 ====== */
.upset-box{background:rgba(255,255,255,.02);border-radius:8px;padding:12px;margin-top:6px}
.upset-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.upset-label{font-size:12px;color:#9A9AB0}
.upset-value{font-size:12px;font-weight:700;padding:2px 8px;border-radius:4px}
.upset-low{color:#00E5A0;background:rgba(0,229,160,.12)}
.upset-medium{color:#FFB800;background:rgba(255,184,0,.12)}
.upset-high{color:#FF4757;background:rgba(255,71,87,.12)}
.upset-bar{height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden}
.upset-fill{height:100%;border-radius:3px;transition:width 1s ease;background:linear-gradient(90deg,#FFB800,#FF4757)}

/* ====== 分析文字 ====== */
.block-title{font-size:13px;font-weight:700;color:#FFB800;margin-bottom:6px;display:block}
.block-text{font-size:12px;color:#b0b0c0;line-height:1.8;white-space:pre-line}
.factor-item{display:flex;align-items:flex-start;gap:6px;margin:4px 0}
.factor-dot{width:5px;height:5px;background:linear-gradient(135deg,#FFB800,#FF8C00);border-radius:50%;margin-top:5px;flex-shrink:0}
.factor-text{font-size:11px;color:#b0b0c0;line-height:1.5}

/* ====== 球员 ====== */
.teams-grid{display:flex;gap:6px}
.team-col{flex:1;min-width:0}
.team-label{font-size:12px;font-weight:700;color:#FFB800;margin-bottom:8px;display:block;text-align:center}
.player-card{background:rgba(255,255,255,.02);border-radius:8px;padding:8px;margin-bottom:6px;border:1px solid rgba(255,255,255,.06);position:relative}
.player-card.star-player{border-color:rgba(255,184,0,.25);background:rgba(255,184,0,.04)}
.player-header{display:flex;align-items:center;gap:4px;margin-bottom:4px}
.player-number{font-size:9px;color:#5A5A72;background:rgba(255,255,255,.06);width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.player-name{font-size:11px;font-weight:600;color:#F0F0F5;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pos-badge{font-size:8px;padding:1px 4px;border-radius:2px;font-weight:600}
.pos-FW{background:rgba(255,71,87,.15);color:#FF4757}
.pos-MF{background:rgba(0,229,160,.15);color:#00E5A0}
.pos-DF{background:rgba(91,141,239,.15);color:#5B8DEF}
.pos-GK{background:rgba(255,184,0,.15);color:#FFB800}
.player-stats{display:flex;gap:2px}
.stat-item{flex:1;text-align:center;background:rgba(0,0,0,.15);border-radius:3px;padding:2px 1px}
.stat-label{font-size:8px;color:#5A5A72;display:block}
.stat-value{font-size:11px;font-weight:700}
.form-excellent{color:#00E5A0}.form-good{color:#5B8DEF}.form-average{color:#FFB800}.form-poor{color:#FF4757}
.injury-tag{margin-top:4px;font-size:9px;padding:1px 5px;border-radius:2px;text-align:center}
.injury-fit{background:rgba(0,229,160,.08);color:#00E5A0}
.injury-doubtful{background:rgba(255,184,0,.08);color:#FFB800}
.injury-out{background:rgba(255,71,87,.08);color:#FF4757}
.star-badge{position:absolute;top:-4px;right:4px;font-size:8px;color:#0A0E1A;background:linear-gradient(135deg,#FFB800,#FF8C00);padding:1px 4px;border-radius:2px;line-height:1.5}

/* ====== 比分 ====== */
.most-likely{text-align:center;padding:14px 0;background:rgba(255,184,0,.15);border-radius:10px;border:1px solid rgba(255,184,0,.2)}
.most-label{font-size:11px;color:#9A9AB0;display:block;margin-bottom:3px}
.most-score{font-size:30px;font-weight:900;color:#FFB800;letter-spacing:3px}
.most-avg{font-size:10px;color:#5A5A72;margin-top:3px;display:block}
.score-list{display:flex;flex-direction:column;gap:3px}
.score-row{display:flex;align-items:center;gap:6px;padding:2px 3px}
.score-row.top-1{background:rgba(255,184,0,.04);border-radius:4px}
.score-rank{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;background:rgba(255,255,255,.06);color:#9A9AB0;flex-shrink:0}
.rank-1{background:linear-gradient(135deg,#FFB800,#FF8C00);color:#fff}
.rank-2{background:rgba(192,192,192,.25);color:#c0c0c0}
.rank-3{background:rgba(205,127,50,.25);color:#cd7f32}
.score-text{width:36px;font-size:13px;font-weight:700;color:#F0F0F5;text-align:center}
.score-bar-track{flex:1;height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden}
.score-bar-fill{height:100%;background:linear-gradient(90deg,#FFB800,#FF8C00);border-radius:3px}
.score-prob{width:44px;font-size:11px;font-weight:600;color:#FFB800;text-align:right}
.goals-grid{display:flex;gap:6px}
.goal-card{flex:1;background:rgba(255,255,255,.02);border-radius:8px;padding:10px 3px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:4px}
.goal-range{font-size:10px;color:#9A9AB0}
.goal-ring{width:22px;height:60px;background:rgba(255,255,255,.06);border-radius:11px;overflow:hidden;display:flex;flex-direction:column-reverse}
.goal-ring-inner{width:100%;background:linear-gradient(180deg,#FFB800,#FF8C00);border-radius:11px}
.goal-prob{font-size:11px;font-weight:700;color:#FFB800}

/* ====== 外部预测 ====== */
.prediction-list{display:flex;flex-direction:column;gap:8px}
.predict-card{background:rgba(255,255,255,.02);border-radius:8px;padding:12px;border:1px solid rgba(255,255,255,.06)}
.predict-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.source-info{display:flex;align-items:center;gap:5px}
.source-avatar{font-size:20px}
.source-name{font-size:12px;font-weight:600;color:#F0F0F5}
.source-type-tag{font-size:8px;color:#5A5A72;background:rgba(255,255,255,.06);padding:1px 5px;border-radius:2px;margin-left:3px}
.conf-badge{font-size:10px;font-weight:700;padding:2px 6px;border-radius:8px}
.conf-high{background:rgba(0,229,160,.12);color:#00E5A0}
.conf-mid{background:rgba(255,184,0,.25);color:#FFB800}
.conf-low{background:rgba(255,71,87,.12);color:#FF4757}
.predict-result{background:rgba(255,184,0,.15);border-radius:4px;padding:5px 8px;margin-bottom:5px}
.result-text{font-size:13px;font-weight:700;color:#FFB800}
.analysis-text{font-size:10px;color:#9A9AB0;line-height:1.6}
.consensus-block{margin-top:10px;padding:10px;background:rgba(255,184,0,.15);border-radius:6px;border:1px solid rgba(255,184,0,.1);text-align:center}
.consensus-title{font-size:11px;color:#9A9AB0;display:block;margin-bottom:2px}
.consensus-text{font-size:12px;font-weight:600;color:#FFB800}

/* ====== 比赛明细(时间轴) ====== */
.summary-card{background:rgba(18,24,42,.85);border-radius:10px;padding:14px 12px;margin-bottom:10px;border:1px solid rgba(255,255,255,.06)}
.summary-teams{display:flex;align-items:center;justify-content:center;gap:12px}
.summary-team{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.summary-flag{width:64px;height:64px;border-radius:50%;border:2px solid rgba(255,184,0,.2);background:rgba(255,255,255,.06);box-shadow:0 4px 12px rgba(0,0,0,.3);object-fit:cover}
.team-flag-sm{width:36px;height:36px;border-radius:50%;border:1px solid rgba(255,184,0,.2);background:rgba(255,255,255,.06);object-fit:cover;vertical-align:middle}
.summary-name{font-size:13px;font-weight:700;color:#F0F0F5}
.summary-score{display:flex;align-items:center;gap:4px}
.summary-score .score-big{font-size:26px;font-weight:900;color:#FFB800;text-shadow:0 0 20rpx rgba(255,184,0,.3)}
.summary-score .score-dash{font-size:18px;color:#5A5A72}
.summary-meta{display:flex;justify-content:center;gap:10px;margin-top:8px;font-size:10px;color:#5A5A72}

.timeline-section{background:rgba(18,24,42,.85);border-radius:10px;padding:14px;border:1px solid rgba(255,255,255,.06)}
.timeline-section .section-title{font-size:14px;font-weight:700;color:#FFB800;margin-bottom:14px;display:flex;align-items:center;gap:6px}
.timeline-section .section-title .title-icon{font-size:16px}
.period-marker{display:flex;align-items:center;gap:8px;padding:6px 0}
.period-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(255,184,0,.15),transparent)}
.period-label{font-size:11px;font-weight:600;color:#5A5A72;white-space:nowrap}
.final-label{color:#FFB800}

.event-row{display:flex;align-items:center;padding:7px 0;position:relative}
.event-side{flex:1;display:flex;align-items:center;gap:6px;min-height:24px}
.event-side.home-side{justify-content:flex-end}
.event-side.away-side{justify-content:flex-start}
.event-info{display:flex;flex-direction:column;gap:1px}
.event-player{font-size:12px;font-weight:700;color:#F0F0F5}
.event-type{font-size:9px;color:#5A5A72}
.event-badge{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.event-badge.badge-goal{background:rgba(255,184,0,.25);border:1px solid rgba(255,184,0,.3)}
.event-badge.badge-penalty{background:rgba(91,141,239,.15)}
.event-badge.badge-own{background:rgba(255,71,87,.15)}
.event-badge .badge-icon{font-size:11px}
.event-time{width:32px;display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative}
.event-time .time-num{font-size:12px;font-weight:800;color:#FFB800}
.event-time .time-extra{font-size:9px;color:#FFB800;position:absolute;top:-2px;right:2px}

/* ====== 底部 ====== */
.footer-note{text-align:center;padding:14px 12px;color:#3a3a4a;font-size:11px}

/* ====== 加载 ====== */
.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:12px;color:#5A5A72}
.spinner{width:28px;height:28px;border:3px solid rgba(255,255,255,.06);border-top-color:#FFB800;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="app">
  <div class="loading-wrap"><div class="spinner"></div>加载中...</div>
</div>

<script>
(function(){
var app = document.getElementById('app');
var API = '/api';
var matches = [];
var currentMatchId = null;
var currentTab = 0;
var cache = {};
var selectedDate = '';

var isoMap = {
  mex:'mx', rsa:'za', kor:'kr', cze:'cz', can:'ca', bih:'ba', qat:'qa', sui:'ch',
  bra:'br', mar:'ma', hai:'ht', sco:'gb-sct', usa:'us', par:'py', aus:'au', tur:'tr',
  ger:'de', cuw:'cw', civ:'ci', ecu:'ec', ned:'nl', jpn:'jp', swe:'se', tun:'tn',
  bel:'be', egy:'eg', irn:'ir', nzl:'nz', esp:'es', cpv:'cv', ksa:'sa', uru:'uy',
  fra:'fr', sen:'sn', irq:'iq', nor:'no', arg:'ar', alg:'dz', aut:'at', jor:'jo',
  por:'pt', cod:'cd', uzb:'uz', col:'co', eng:'gb-eng', cro:'hr', gha:'gh', pan:'pa'
};
function flagUrl(id) {
  var code = isoMap[id] || id;
  return 'https://flagcdn.com/w80/' + code + '.png';
}

// 日期工具
var WEEKDAYS = ['周日','周一','周二','周三','周四','周五','周六'];

function fmtDate(d){
  var y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0');
  return y+'-'+m+'-'+day;
}

function getTomorrow(){ var d=new Date(); d.setDate(d.getDate()+1); return d; }
function isTodayTomorrow(d){ return d===fmtDate(getTomorrow()); }
function dateDisplay(d){ var p=d.split('-'); return parseInt(p[1])+'月'+parseInt(p[2])+'日'; }
function dateWeekday(d){ var dt=new Date(d); return WEEKDAYS[dt.getDay()]; }
function getRangeEnd(){ var d=new Date(); d.setDate(d.getDate()+30); return fmtDate(d); }
function changeDate(delta){
  var d=new Date(selectedDate); d.setDate(d.getDate()+delta);
  var nd=fmtDate(d);
  if(nd<'2026-06-12'||nd>getRangeEnd()) return;
  selectedDate=nd; loadMatchesByDate(nd);
}
function onDateInput(e){
  var v=e.target.value; if(v&&v!==selectedDate){ selectedDate=v; loadMatchesByDate(v); }
}

// 工具函数
function formClass(v){ return v>=8.5?'form-excellent':v>=7?'form-good':v>=5.5?'form-average':'form-poor'; }
function injIcon(s){ return {fit:'✅',doubtful:'⚠️',out:'🔴'}[s]||'❓'; }
function confCls(c){ return c>=0.7?'conf-high':c>=0.5?'conf-mid':'conf-low'; }
function upsetCls(l){ return l==='high'?'upset-high':l==='low'?'upset-low':'upset-medium'; }
function upsetLbl(l,p){ return {low:'低风险',medium:'中等风险',high:'高风险'}[l]+' ('+(p*100).toFixed(0)+'%)'; }

// ====== 日期选择器 ======
function renderDateBar(){
  var h='<div class="date-bar">';
  h+='<div class="date-arrow" onclick="window._chgDate(-1)"><span class="arrow">‹</span></div>';
  h+='<div class="date-center" onclick="document.getElementById(\'dpicker\').showPicker()">';
  h+='<span class="date-weekday">'+dateWeekday(selectedDate)+'</span>';
  h+='<span class="date-main">'+dateDisplay(selectedDate)+'</span>';
  if(isTodayTomorrow(selectedDate)) h+='<span class="date-tag">明日</span>';
  h+='</div>';
  h+='<div class="date-arrow" onclick="window._chgDate(1)"><span class="arrow">›</span></div>';
  h+='<input type="date" id="dpicker" class="date-picker" value="'+selectedDate+'" min="2026-06-12" max="'+getRangeEnd()+'" onchange="window._onDate(this)">';
  h+='</div>';
  return h;
}

// ====== 比赛选择器 ======
function renderSelector(){
  var h='<div class="match-selector"><div class="match-slider">';
  for(var i=0;i<matches.length;i++){
    var m=matches[i],isFinished=m.status==='finished';
    h+='<div class="match-card'+(m.id===currentMatchId?' active':'')+(isFinished?' finished':'')+'" onclick="window._select(\''+m.id+'\')">';
    h+='<div class="card-teams">';
    h+='<div class="card-team"><img class="card-flag" src="'+flagUrl(m.homeTeam.id)+'" /><span class="card-team-name">'+m.homeTeam.name+'</span><span class="card-team-tag">主</span></div>';
    h+='<div class="card-center">';
    if(isFinished&&m.result) h+='<span class="card-score">'+m.result.homeScore+' : '+m.result.awayScore+'</span>';
    else h+='<span class="card-vs">VS</span>';
    h+='</div>';
    h+='<div class="card-team"><img class="card-flag" src="'+flagUrl(m.awayTeam.id)+'" /><span class="card-team-name">'+m.awayTeam.name+'</span></div>';
    h+='</div><span class="card-time">'+m.kickoffTime+'</span></div>';
  }
  h+='</div></div>';
  return h;
}

// ====== 比赛信息头 ======
function renderHeader(m){
  var isFinished=m.status==='finished'&&m.result;
  var h='<div class="match-header">';
  h+='<span class="stage-tag">'+m.stage+'</span>';
  h+='<div class="teams-row">';
  h+='<div class="team-info"><img class="team-flag" src="'+flagUrl(m.homeTeam.id)+'" /><span class="team-name">'+m.homeTeam.name+'</span><span class="team-meta">FIFA #'+m.homeTeam.fifaRank+'</span><span class="team-formation">'+(m.homeTeam.formation||'')+'</span></div>';
  if(isFinished){
    h+='<div class="score-circle"><span class="score-num">'+m.result.homeScore+'</span><span class="score-sep">:</span><span class="score-num">'+m.result.awayScore+'</span></div>';
  }else{
    h+='<div class="vs-circle">VS</div>';
  }
  h+='<div class="team-info"><img class="team-flag" src="'+flagUrl(m.awayTeam.id)+'" /><span class="team-name">'+m.awayTeam.name+'</span><span class="team-meta">FIFA #'+m.awayTeam.fifaRank+'</span><span class="team-formation">'+(m.awayTeam.formation||'')+'</span></div>';
  h+='</div>';
  if(isFinished&&m.result){
    h+='<div class="scorers-row">';
    h+='<div class="scorers-col">'+m.result.homeScorers.map(function(s){return '<span class="scorer-text">'+s+'</span>';}).join('')+'</div>';
    h+='<div class="scorers-col away">'+m.result.awayScorers.map(function(s){return '<span class="scorer-text">'+s+'</span>';}).join('')+'</div>';
    h+='</div>';
  }
  h+='<div class="match-meta"><span>'+m.matchDate+' '+m.kickoffTime+'</span><span>'+m.venue+'</span></div></div>';
  return h;
}

// ====== Tab 栏 ======
function renderTabs(m){
  var isFinished=m.status==='finished';
  var tabs=isFinished
    ?[{icon:'📋',label:'比赛明细'},{icon:'🏃',label:'球员状态'},{icon:'🌐',label:'平台汇总'}]
    :[{icon:'📊',label:'胜负预测'},{icon:'🏃',label:'球员状态'},{icon:'⚽',label:'比分预测'},{icon:'🌐',label:'平台汇总'}];
  var h='<div class="tab-bar">';
  for(var i=0;i<tabs.length;i++){
    h+='<div class="tab-item'+(i===currentTab?' active':'')+'" onclick="window._tab('+i+')">';
    h+='<span class="tab-icon">'+tabs[i].icon+'</span>'+tabs[i].label;
    h+='</div>';
  }
  h+='</div>';
  return h;
}

// ====== Tab: 比赛明细(时间轴) ======
function renderMatchDetail(d){
  var m=d.match,r=m.result;
  if(!r||!r.timeline||!r.timeline.length) return '<div class="card"><div class="section-title">暂无时间轴数据</div></div>';
  var tl=r.timeline.slice().sort(function(a,b){return a.minute-b.minute;});
  var h='<div class="summary-card">';
  h+='<div class="summary-teams">';
  h+='<div class="summary-team"><img class="summary-flag" src="'+flagUrl(m.homeTeam.id)+'" /><span class="summary-name">'+m.homeTeam.name+'</span></div>';
  h+='<div class="summary-score"><span class="score-big">'+r.homeScore+'</span><span class="score-dash">-</span><span class="score-big">'+r.awayScore+'</span></div>';
  h+='<div class="summary-team"><img class="summary-flag" src="'+flagUrl(m.awayTeam.id)+'" /><span class="summary-name">'+m.awayTeam.name+'</span></div>';
  h+='</div><div class="summary-meta"><span>'+m.stage+'</span><span>'+m.matchDate+' '+m.kickoffTime+'</span><span>'+m.venue+'</span></div>';
  h+='</div>';

  h+='<div class="timeline-section"><div class="section-title"><span class="title-icon">⚽</span>比赛时间轴</div>';
  h+='<div class="period-marker"><div class="period-line"></div><span class="period-label">上半场</span><div class="period-line"></div></div>';

  var pastHalf=false;
  for(var i=0;i<tl.length;i++){
    var e=tl[i];
    if(e.minute>45&&!pastHalf&&i>0&&tl[i-1].minute<=45){
      pastHalf=true;
      h+='<div class="period-marker"><div class="period-line"></div><span class="period-label">下半场</span><div class="period-line"></div></div>';
    }
    var bc='badge-goal',bi='⚽',tlbl='进球';
    if(e.type==='own_goal'){bc='badge-own';bi='😵';tlbl='乌龙球';}
    else if(e.type==='penalty'){bc='badge-penalty';bi='🎯';tlbl='点球';}

    h+='<div class="event-row">';
    h+='<div class="event-side home-side">';
    if(e.team==='home'){
      h+='<div class="event-info"><span class="event-player">'+e.player+'</span><span class="event-type">'+tlbl+'</span></div>';
      h+='<div class="event-badge '+bc+'"><span class="badge-icon">'+bi+'</span></div>';
    }
    h+='</div>';
    h+='<div class="event-time"><span class="time-num">'+e.minute+'\'</span>'+(e.isExtraTime?'<span class="time-extra">+</span>':'')+'</div>';
    h+='<div class="event-side away-side">';
    if(e.team==='away'){
      h+='<div class="event-badge '+bc+'"><span class="badge-icon">'+bi+'</span></div>';
      h+='<div class="event-info"><span class="event-player">'+e.player+'</span><span class="event-type">'+tlbl+'</span></div>';
    }
    h+='</div></div>';
  }
  h+='<div class="period-marker"><div class="period-line"></div><span class="period-label final-label">全场结束</span><div class="period-line"></div></div>';
  h+='</div>';
  return h;
}

// ====== Tab: 胜负预测 ======
function renderTabWP(d){
  var w=d.winPrediction;
  var h='<div class="card"><div class="section-title">胜平负预测</div>';
  h+='<div class="prob-bar"><span class="prob-label">主胜</span><div class="prob-track"><div class="prob-fill prob-home" style="width:'+(w.homeWinProb*100)+'%"></div></div><span class="prob-value">'+(w.homeWinProb*100).toFixed(1)+'%</span></div>';
  h+='<div class="prob-bar"><span class="prob-label">平局</span><div class="prob-track"><div class="prob-fill prob-draw" style="width:'+(w.drawProb*100)+'%"></div></div><span class="prob-value">'+(w.drawProb*100).toFixed(1)+'%</span></div>';
  h+='<div class="prob-bar"><span class="prob-label">客胜</span><div class="prob-track"><div class="prob-fill prob-away" style="width:'+(w.awayWinProb*100)+'%"></div></div><span class="prob-value">'+(w.awayWinProb*100).toFixed(1)+'%</span></div>';
  h+='<div class="upset-box"><div class="upset-header"><span class="upset-label">爆冷指数</span><span class="upset-value '+upsetCls(w.upsetLevel)+'">'+upsetLbl(w.upsetLevel,w.upsetProb)+'</span></div><div class="upset-bar"><div class="upset-fill" style="width:'+(w.upsetProb*100)+'%"></div></div></div></div>';
  if(w.tacticalAnalysis) h+='<div class="card"><span class="block-title">战术打法分析</span><span class="block-text">'+w.tacticalAnalysis+'</span></div>';
  if(w.coachComparison) h+='<div class="card"><span class="block-title">教练对比分析</span><span class="block-text">'+w.coachComparison+'</span></div>';
  if(w.keyFactors&&w.keyFactors.length){
    h+='<div class="card"><span class="block-title">关键因素</span>';
    for(var i=0;i<w.keyFactors.length;i++) h+='<div class="factor-item"><span class="factor-dot"></span><span class="factor-text">'+w.keyFactors[i]+'</span></div>';
    h+='</div>';
  }
  return h;
}

// ====== Tab: 球员状态 ======
function renderTabPS(d){
  var m=d.match, hp=d.playerStatus.homePlayers||[], ap=d.playerStatus.awayPlayers||[];
  function rp(players){
    var h='';
    for(var i=0;i<players.length;i++){
      var p=players[i];
      h+='<div class="player-card'+(p.isStarPlayer?' star-player':'')+'">';
      h+='<div class="player-header"><span class="player-number">'+p.number+'</span><span class="player-name">'+p.name+'</span><span class="pos-badge pos-'+p.position+'">'+p.position+'</span></div>';
      h+='<div class="player-stats"><div class="stat-item"><span class="stat-label">状态</span><span class="stat-value '+formClass(p.recentForm)+'">'+p.recentForm.toFixed(1)+'</span></div><div class="stat-item"><span class="stat-label">进球</span><span class="stat-value">'+p.recentGoals+'</span></div><div class="stat-item"><span class="stat-label">助攻</span><span class="stat-value">'+p.recentAssists+'</span></div></div>';
      if(p.injury) h+='<div class="injury-tag injury-'+p.injury.status+'">'+injIcon(p.injury.status)+' '+p.injury.description+'</div>';
      if(p.isStarPlayer) h+='<div class="star-badge">⭐核心</div>';
      h+='</div>';
    }
    return h;
  }
  var h='<div class="card"><div class="section-title">核心球员状态</div><div class="teams-grid">';
  h+='<div class="team-col"><span class="team-label"><img class="team-flag-sm" src="'+flagUrl(m.homeTeam.id)+'" /> '+m.homeTeam.name+'</span>'+rp(hp)+'</div>';
  h+='<div class="team-col"><span class="team-label"><img class="team-flag-sm" src="'+flagUrl(m.awayTeam.id)+'" /> '+m.awayTeam.name+'</span>'+rp(ap)+'</div>';
  h+='</div></div>';
  return h;
}

// ====== Tab: 比分预测 ======
function renderTabSP(d){
  var s=d.scorePrediction, maxP=s.topScores[0]?.probability||0.2;
  var h='<div class="card"><div class="section-title">比分预测分析</div>';
  h+='<div class="most-likely"><span class="most-label">最可能比分</span><span class="most-score">'+s.mostLikelyScore+'</span><span class="most-avg">预期进球 '+s.avgGoals+' 球</span></div></div>';
  h+='<div class="card"><span class="sub-title">比分概率 Top 10</span><div class="score-list">';
  for(var i=0;i<s.topScores.length;i++){
    var sc=s.topScores[i];
    h+='<div class="score-row'+(i===0?' top-1':'')+'"><span class="score-rank '+(i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'')+'">'+(i+1)+'</span><span class="score-text">'+sc.score+'</span><div class="score-bar-track"><div class="score-bar-fill" style="width:'+(sc.probability/maxP*100)+'%"></div></div><span class="score-prob">'+(sc.probability*100).toFixed(2)+'%</span></div>';
  }
  h+='</div></div>';
  h+='<div class="card"><span class="sub-title">总进球数概率</span><div class="goals-grid">';
  for(var i=0;i<s.totalGoals.length;i++){
    var g=s.totalGoals[i];
    h+='<div class="goal-card"><span class="goal-range">'+g.range+'</span><div class="goal-ring"><div class="goal-ring-inner" style="height:'+(g.probability*100)+'%"></div></div><span class="goal-prob">'+(g.probability*100).toFixed(0)+'%</span></div>';
  }
  h+='</div></div>';
  return h;
}

// ====== Tab: 平台汇总 ======
function renderTabEP(d){
  var ext=d.externalPredict.predictions||[];
  var h='<div class="card"><div class="section-title">知名平台预测汇总</div><div class="prediction-list">';
  for(var i=0;i<ext.length;i++){
    var e=ext[i];
    h+='<div class="predict-card"><div class="predict-header"><div class="source-info"><span class="source-avatar">'+e.avatar+'</span><span class="source-name">'+e.source+'<span class="source-type-tag">'+e.sourceType+'</span></span></div><span class="conf-badge '+confCls(e.confidence)+'">'+(e.confidence*100).toFixed(0)+'%</span></div><div class="predict-result"><span class="result-text">'+e.prediction+'</span></div><span class="analysis-text">'+e.analysis+'</span></div>';
  }
  h+='</div><div class="consensus-block"><span class="consensus-title">预测一致性</span><span class="consensus-text">共 '+ext.length+' 个来源，多维度分析仅供参考</span></div></div>';
  return h;
}

// ====== 整体渲染 ======
function render(d){
  var m=d.match, isFinished=m.status==='finished';
  var h=renderDateBar();
  h+=renderSelector();
  h+=renderHeader(m);
  h+=renderTabs(m);
  h+='<div class="tab-content">';

  if(isFinished){
    var finTabs=[
      '<div class="tab-panel'+(currentTab===0?' active':'')+'">'+renderMatchDetail(d)+'</div>',
      '<div class="tab-panel'+(currentTab===1?' active':'')+'">'+renderTabPS(d)+'</div>',
      '<div class="tab-panel'+(currentTab===2?' active':'')+'">'+renderTabEP(d)+'</div>'
    ];
    h+=finTabs.join('');
  }else{
    var upTabs=[
      '<div class="tab-panel'+(currentTab===0?' active':'')+'">'+renderTabWP(d)+'</div>',
      '<div class="tab-panel'+(currentTab===1?' active':'')+'">'+renderTabPS(d)+'</div>',
      '<div class="tab-panel'+(currentTab===2?' active':'')+'">'+renderTabSP(d)+'</div>',
      '<div class="tab-panel'+(currentTab===3?' active':'')+'">'+renderTabEP(d)+'</div>'
    ];
    h+=upTabs.join('');
  }

  h+='</div><div class="footer-note">'+(isFinished?'比赛已结束':'AI模型生成 · 仅供参考')+'</div>';
  app.innerHTML=h;
}

// ====== 空状态 ======
function renderEmpty(){
  var h=renderDateBar();
  h+='<div class="empty-wrap"><span style="font-size:32px">⚽</span><span class="empty-text">当日暂无比赛安排</span><span class="empty-hint">试试切换其他日期</span></div>';
  app.innerHTML=h;
}

// ====== 加载比赛 ======
function loadMatchesByDate(date){
  var mList=window.__ALL_MATCHES__||[];
  matches=mList.filter(function(m){return m.matchDate===date;});
  currentTab=0;
  if(matches.length>0){
    currentMatchId=matches[0].id;
    window._select(currentMatchId);
  }else{
    renderEmpty();
  }
}

window._chgDate=changeDate;
window._onDate=function(el){ onDateInput({target:{value:el.value}}); };

// ====== 切换比赛 ======
window._select=function(id){
  if(id===currentMatchId&&cache[id]) return;
  currentMatchId=id;
  currentTab=0;
  if(cache[id]){ render(cache[id]); return; }
  app.innerHTML='<div class="loading-wrap"><div class="spinner"></div>加载预测数据...</div>';
  fetch(API+'/predict/'+id+'/full').then(function(r){return r.json()}).then(function(res){
    if(!res.success) throw new Error(res.error);
    cache[id]=res.data;
    render(res.data);
  }).catch(function(e){
    app.innerHTML='<div class="loading-wrap">加载失败: '+e.message+'</div>';
  });
};

// ====== 切换Tab ======
window._tab=function(idx){
  if(idx===currentTab) return;
  currentTab=idx;
  if(cache[currentMatchId]) render(cache[currentMatchId]);
};

// ====== 初始化 ======
function initApp(){
  selectedDate=fmtDate(getTomorrow());
  if(window.__INIT_DATA__){
    matches=window.__INIT_DATA__.matches||[];
    window.__ALL_MATCHES__=matches;
    var pd=window.__INIT_DATA__.predictData;
    if(pd) cache[pd.match.id]=pd;
    if(matches.length>0){
      currentMatchId=matches[0].id;
      render(pd||cache[matches[0].id]);
    }else{renderEmpty();}
    return;
  }
  fetch(API+'/matches').then(function(r){return r.json()}).then(function(res){
    var all=res.data||[];
    window.__ALL_MATCHES__=all;
    loadMatchesByDate(selectedDate);
  }).catch(function(){
    app.innerHTML='<div class="loading-wrap">API连接失败<br><small style="color:#4a4a5a">请确保后端已启动</small></div>';
  });
}
initApp();
})();
</script>
</body>
</html>
