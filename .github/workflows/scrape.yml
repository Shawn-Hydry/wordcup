name: Update World Cup Data

on:
  # 每日定时执行（北京时间 14:00=UTC 6:00, 18:00=UTC 10:00, 22:00=UTC 14:00）
  schedule:
    - cron: '0 6 * * *'
    - cron: '0 10 * * *'
    - cron: '0 14 * * *'
  # 支持手动触发
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger data refresh
        run: |
          echo "Calling POST /api/admin/refresh ..."
          RESPONSE=$(curl -s -X POST "${{ vars.API_BASE_URL || 'https://backend-ashy-pi-46.vercel.app' }}/api/admin/refresh")
          echo "Response: $RESPONSE"

          # 检查是否成功
          SUCCESS=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('success', False))" 2>/dev/null || echo "false")
          if [ "$SUCCESS" = "True" ]; then
            echo "✅ Data refresh succeeded"
          else
            echo "❌ Data refresh failed"
            exit 1
          fi

      - name: Summary
        if: always()
        run: |
          echo "### 数据更新结果" >> $GITHUB_STEP_SUMMARY
          echo "- 触发时间: $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- API: ${{ vars.API_BASE_URL || 'https://backend-ashy-pi-46.vercel.app' }}/api/admin/refresh" >> $GITHUB_STEP_SUMMARY
